<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%" style="background-color: #090a0f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0718" />
      <stop offset="50%" stop-color="#05030d" />
      <stop offset="100%" stop-color="#0e0414" />
    </linearGradient>
    <linearGradient id="cyan-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="100%" stop-color="#7000ff" stop-opacity="0" />
    </linearGradient>
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" stop-opacity="0" />
      <stop offset="50%" stop-color="#ff007f" stop-opacity="1" />
      <stop offset="100%" stop-color="#ff007f" stop-opacity="0" />
    </linearGradient>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-subtle" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#251b47" stroke-width="0.7" stroke-opacity="0.6" />
    </pattern>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#00f0ff" fill-opacity="0.1" />
    </pattern>
  </defs>

  <style>
    /* CSS Styles and Keyframe Animations */
    .pulse {
      animation: pulse-anim 4s infinite ease-in-out;
    }
    .scanner {
      animation: scan-anim 6s infinite ease-in-out;
    }
    .float {
      animation: float-anim 5s infinite ease-in-out;
    }
    .glitch-1 {
      animation: glitch-anim-1 8s infinite linear;
    }
    .glitch-2 {
      animation: glitch-anim-2 8s infinite linear;
    }
    .star-twinkle {
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes pulse-anim {
      0%, 100% { opacity: 0.8; filter: drop-shadow(0 0 2px #00f0ff); }
      50% { opacity: 1; filter: drop-shadow(0 0 8px #00f0ff) drop-shadow(0 0 15px #bd00ff); }
    }
    @keyframes scan-anim {
      0% { transform: translateY(-10px); opacity: 0; }
      5% { opacity: 0.8; }
      45% { opacity: 0.8; }
      50% { transform: translateY(270px); opacity: 0; }
      100% { transform: translateY(270px); opacity: 0; }
    }
    @keyframes float-anim {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-8px) rotate(2deg); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(0.8); }
      50% { opacity: 0.9; transform: scale(1.2); }
    }
    @keyframes glitch-anim-1 {
      0%, 95%, 100% { transform: translate(0); }
      96% { transform: translate(-2px, 1px); }
      97% { transform: translate(2px, -1px); }
      98% { transform: translate(-1px, -2px); }
      99% { transform: translate(1px, 2px); }
    }
    @keyframes glitch-anim-2 {
      0%, 95%, 100% { transform: translate(0); }
      96% { transform: translate(1px, -2px); }
      97% { transform: translate(-1px, 2px); }
      98% { transform: translate(2px, 1px); }
      99% { transform: translate(-2px, -1px); }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="260" fill="url(#bg-grad)" />

  <!-- Xerox grid and patterns -->
  <rect width="800" height="260" fill="url(#grid)" />
  <rect width="800" height="260" fill="url(#dot-grid)" />

  <!-- Diagonal Cyber Lines (Xerox copier aesthetic) -->
  <path d="M-100 260 L300 -50" stroke="url(#cyan-grad)" stroke-width="1.5" opacity="0.3" />
  <path d="M0 260 L400 -50" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.2" />
  <path d="M500 310 L900 0" stroke="url(#cyan-grad)" stroke-width="1" opacity="0.15" />

  <!-- Decorative Matrix/Runic elements (Magical Code) -->
  <g opacity="0.25" font-family="Courier New, monospace" font-size="10" fill="#00f0ff">
    <text x="30" y="40">01010111 01001001 01011010 01000001 01010010 01000100</text>
    <text x="30" y="60">SYS.INIT: //SPELL_CAST_OK</text>
    <text x="30" y="80">MANA_LEVEL: 0xAFF3</text>
    <text x="30" y="100">XEROX_REPLICATOR: ACTIVE</text>
    
    <text x="540" y="180">01011000 01000101 01010010 01001111 01011000</text>
    <text x="540" y="200">REPLICATE_TARGET: PROJ_0x23</text>
    <text x="540" y="220">MUTATION_RATE: 0.04%</text>
    <text x="540" y="240">STATUS: REPLICATING...</text>
  </g>

  <!-- Twinkling stars / Magic sparks -->
  <g fill="#ff007f">
    <circle cx="120" cy="180" r="1.5" class="star-twinkle" style="animation-delay: 0.5s;" />
    <circle cx="280" cy="50" r="2" class="star-twinkle" style="animation-delay: 1.2s;" />
    <circle cx="450" cy="220" r="1" class="star-twinkle" style="animation-delay: 0.1s;" />
    <circle cx="500" cy="40" r="2.5" class="star-twinkle" style="animation-delay: 2s;" />
    <circle cx="700" cy="90" r="1.5" class="star-twinkle" style="animation-delay: 0.8s;" />
    <circle cx="150" cy="100" r="1" class="star-twinkle" style="animation-delay: 1.7s;" />
  </g>
  <g fill="#00f0ff">
    <circle cx="180" cy="210" r="1.5" class="star-twinkle" style="animation-delay: 1.5s;" />
    <circle cx="380" cy="30" r="1" class="star-twinkle" style="animation-delay: 0.3s;" />
    <circle cx="620" cy="60" r="2" class="star-twinkle" style="animation-delay: 2.2s;" />
    <circle cx="720" cy="170" r="1.5" class="star-twinkle" style="animation-delay: 0.9s;" />
  </g>

  <!-- Glowing background blobs behind text for premium depth -->
  <circle cx="400" cy="130" r="120" fill="#8a2be2" opacity="0.15" filter="url(#glow-magenta)" />
  <circle cx="280" cy="110" r="80" fill="#00f0ff" opacity="0.1" filter="url(#glow-cyan)" />
  <circle cx="520" cy="140" r="80" fill="#ff007f" opacity="0.1" filter="url(#glow-magenta)" />

  <!-- Animated Scanner Laser (The Xerox scan line) -->
  <g class="scanner">
    <rect x="0" y="0" width="800" height="4" fill="url(#laser-grad)" filter="url(#glow-magenta)" />
  </g>

  <!-- Central Wizard Icon / Sigil -->
  <g transform="translate(400, 85) scale(0.65)" class="float">
    <!-- Wizard Hat SVG outline -->
    <path d="M 0,-70 L -45,15 L 45,15 Z" fill="none" stroke="#ff007f" stroke-width="3" filter="url(#glow-magenta)" />
    <!-- Hat Brim -->
    <path d="M -60,15 C -20,30 20,30 60,15 C 40,5 -40,5 -60,15 Z" fill="none" stroke="#00f0ff" stroke-width="3" filter="url(#glow-cyan)" stroke-linecap="round" />
    <!-- Magical Ribbon -->
    <path d="M -30,0 C -10,5 10,5 30,0" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.8" />
    <!-- Floating Spark above hat -->
    <polygon points="0,-90 4,-82 12,-80 4,-78 0,-70 -4,-78 -12,-80 -4,-82" fill="#00f0ff" filter="url(#glow-cyan)" />
  </g>

  <!-- Main Title -->
  <g class="glitch-1">
    <text x="400" y="170" text-anchor="middle" font-size="44" font-weight="900" letter-spacing="6" fill="#ffffff" filter="url(#glow-cyan)" class="pulse">
      WIZARD OF XEROX
    </text>
  </g>
  <g class="glitch-2" opacity="0.9">
    <text x="398" y="171" text-anchor="middle" font-size="44" font-weight="900" letter-spacing="6" fill="#ff007f" opacity="0.5" style="mix-blend-mode: screen;">
      WIZARD OF XEROX
    </text>
  </g>
  <g class="glitch-1" opacity="0.9">
    <text x="402" y="169" text-anchor="middle" font-size="44" font-weight="900" letter-spacing="6" fill="#00f0ff" opacity="0.5" style="mix-blend-mode: screen;">
      WIZARD OF XEROX
    </text>
  </g>

  <!-- Subtitle -->
  <text x="400" y="205" text-anchor="middle" font-size="13" font-weight="600" letter-spacing="4" fill="#00f0ff" opacity="0.9" font-family="'Courier New', monospace">
    // REPLICATING DIGITAL REALITIES &#8226; CASTING SPELLS IN CODE
  </text>

  <!-- Border elements -->
  <!-- Neon cyan corners -->
  <path d="M 15 35 L 15 15 L 35 15" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow-subtle)" />
  <path d="M 785 35 L 785 15 L 765 15" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow-subtle)" />
  <path d="M 15 225 L 15 245 L 35 245" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow-subtle)" />
  <path d="M 785 225 L 785 245 L 765 245" fill="none" stroke="#00f0ff" stroke-width="2" filter="url(#glow-subtle)" />

  <!-- Thin boundary borders -->
  <line x1="45" y1="15" x2="755" y2="15" stroke="#251b47" stroke-width="1" opacity="0.5" />
  <line x1="45" y1="245" x2="755" y2="245" stroke="#251b47" stroke-width="1" opacity="0.5" />
  <line x1="15" y1="45" x2="15" y2="215" stroke="#251b47" stroke-width="1" opacity="0.5" />
  <line x1="785" y1="45" x2="785" y2="215" stroke="#251b47" stroke-width="1" opacity="0.5" />
</svg>
